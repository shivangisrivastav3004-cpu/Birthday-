<!DOCTYPE html>
<html>
<head>
  <title>Birthday Surprise 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f5dc, #fdf6e3);
      color: #4b3f2f;
      text-align: center;
    }

    .page {
      display: none;
      padding: 40px;
    }

    .active {
      display: block;
    }

    button {
      padding: 12px 22px;
      margin: 15px;
      border: none;
      border-radius: 25px;
      background: #d4a373;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #b08968;
    }

    .balloon {
      font-size: 45px;
      cursor: pointer;
      margin: 10px;
      transition: transform 0.2s;
    }

    .balloon:hover {
      transform: scale(1.2);
    }

    .cake {
      font-size: 90px;
      margin: 20px;
    }

    .hidden {
      display: none;
    }

    h1, h2 {
      font-weight: 500;
    }
  </style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <h1>Hey ❤️</h1>
  <p>I made something special for you...</p>
  <button onclick="nextPage(1)">Next</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <h1>Just wait...</h1>
  <p>You mean a lot to me 💖</p>
  <button onclick="nextPage(2)">Next</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <h1>Ready?</h1>
  <button onclick="nextPage(3)">Start 🎈</button>
</div>

<!-- BALLOON PAGE -->
<div id="page4" class="page">
  <h2>Tap the balloons 🎈</h2>

  <div>
    <span class="balloon" onclick="popBalloon()">🎈</span>
    <span class="balloon" onclick="popBalloon()">🎈</span>
    <span class="balloon" onclick="popBalloon()">🎈</span>
    <span class="balloon" onclick="popBalloon()">🎈</span>
  </div>

  <h2 id="balloonText"></h2>

  <button onclick="nextPage(4)">Next</button>
</div>

<!-- CAKE PAGE -->
<div id="page5" class="page">
  <h2>Decorate the cake 🎂</h2>

  <div id="cake" class="cake">🎂</div>

  <button onclick="decorate()">Decorate</button>
  <button onclick="blow()">Blow Candles</button>
  <button onclick="cutCake()">Cut Cake</button>

  <div id="slice" class="hidden">🍰</div>

  <br>
  <button onclick="nextPage(5)">Next</button>
</div>

<!-- ENVELOPE PAGE -->
<div id="page6" class="page">
  <h2>Open this 💌</h2>

  <div style="font-size:70px; cursor:pointer;" onclick="openLetter()">📩</div>

  <p id="letter" class="hidden" style="margin-top:20px; font-size:18px;">
    You are the most special person in my life ❤️<br><br>
    I’m so lucky to have you 💖<br><br>
    Happy Birthday 🎉
  </p>
</div>

<script>
  function nextPage(current) {
    document.getElementById("page" + current).classList.remove("active");
    document.getElementById("page" + (current + 1)).classList.add("active");
  }

  // BALLOON LOGIC
  let step = 0;
  const texts = [
    "You",
    "You are",
    "You are very",
    "You are very special ❤️"
  ];

  function popBalloon() {
    if (step < texts.length) {
      document.getElementById("balloonText").innerText = texts[step];
      step++;
    }
  }

  // CAKE LOGIC
  function decorate() {
    document.getElementById("cake").innerText = "🎂🕯️";
  }

  function blow() {
    document.getElementById("cake").innerText = "🎂";
  }

  function cutCake() {
    document.getElementById("slice").classList.remove("hidden");
  }

  // ENVELOPE
  function openLetter() {
    document.getElementById("letter").classList.remove("hidden");
  }
</script>

</body>
</html>
